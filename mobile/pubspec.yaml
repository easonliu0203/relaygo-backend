name: ride_booking_app
description: 包車/接送叫車服務 APP
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 狀態管理
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # 路由
  go_router: ^12.1.3

  # UI 組件
  material_color_utilities: ^0.11.1
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^2.7.0

  # 網路請求
  dio: ^5.4.0
  retrofit: ^4.0.3
  http: ^1.1.0
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  rxdart: ^0.27.7

  # 本地存儲
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  firebase_messaging: ^14.7.10
  firebase_storage: ^11.5.6
  firebase_database: ^10.4.0
  cloud_firestore: ^4.13.6
  firebase_crashlytics: ^3.4.8
  firebase_analytics: ^10.7.4
  google_sign_in: ^6.1.6
  # sign_in_with_apple: ^5.0.0  # 暫時移除以解決兼容性問題

  # Supabase
  supabase_flutter: ^2.0.0

  # 地圖與定位
  google_maps_flutter: ^2.5.0
  location: ^5.0.3
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # 多媒體
  image_picker: ^1.0.4
  # file_picker: ^6.1.1  # 暫時移除以解決兼容性問題
  permission_handler: ^11.1.0

  # 工具類
  intl: ^0.20.2
  uuid: ^4.2.1
  url_launcher: ^6.2.2
  package_info_plus: ^4.2.0
  device_info_plus: ^9.1.1
  crypto: ^3.0.3

  # 支付 (暫時移除以解決兼容性問題)
  # pay: ^1.1.2

  # 聊天
  socket_io_client: ^2.0.3+1

  # 其他
  flutter_dotenv: ^5.1.0
  logger: ^2.0.2+1
  webview_flutter: ^4.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

  # 代碼生成
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  retrofit_generator: ^8.0.4
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  freezed: ^2.4.6

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - .env

  # fonts:
  #   - family: NotoSansTC
  #     fonts:
  #       - asset: assets/fonts/NotoSansTC-Regular.ttf
